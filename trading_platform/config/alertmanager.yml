# ملف: config/alertmanager.yml
# المسار: /trading_platform/config/alertmanager.yml

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook'

receivers:
- name: 'webhook'
  webhook_configs:
  - url: 'http://backend:8000/api/alerts/webhook'
    send_resolved: true

- name: 'email'
  email_configs:
  - to: 'admin@trading-platform.com'
    from: 'alerts@trading-platform.com'
    smarthost: 'smtp.gmail.com:587'
    auth_username: 'alerts@trading-platform.com'
    auth_password: 'email_password'
    require_tls: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
