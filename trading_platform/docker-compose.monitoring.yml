# ملف: docker-compose.production.yml
# المسار: /trading_platform/docker-compose.production.yml
# الوظيفة: بيئة العمل بدقة عالية وسرعة فائقة

version: '3.8'

services:
  # ====================== قاعدة البيانات عالية الأداء ======================
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: trading_timescaledb_prod
    environment:
      POSTGRES_DB: trading_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SHARED_BUFFERS: 4GB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 12GB
      POSTGRES_WORK_MEM: 128MB
      POSTGRES_MAINTENANCE_WORK_MEM: 1GB
    ports:
      - "5432:5432"
    volumes:
      - timescale_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - trading_network_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================== Redis فائق السرعة ======================
  redis:
    image: redis:7-alpine
    container_name: trading_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 4gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - trading_network_prod
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G

  # ====================== Backend محسن ======================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: trading_backend_prod
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@timescaledb:5432/trading_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
