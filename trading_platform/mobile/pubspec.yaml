# ملف: mobile/pubspec.yaml
# المسار: /trading_platform/mobile/pubspec.yaml

name: trading_platform
description: منصة تحليل وتداول الأسهم - تطبيق موبايل احترافي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  
  # Charts & Data
  fl_chart: ^0.63.0
  syncfusion_flutter_charts: ^23.2.7
  
  # Networking
  dio: ^5.3.2
  web_socket_channel: ^2.4.0
  
  # State Management
  provider: ^6.0.5
  flutter_bloc: ^8.1.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Authentication
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  
  # Notifications
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^16.2.0
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.1.14
  share_plus: ^7.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
