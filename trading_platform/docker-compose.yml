
### 2️⃣5️⃣ **ملف: `docker-compose.full.yml` (النسخة الكاملة)**

```yaml
# ملف: docker-compose.full.yml
# المسار: /trading_platform/docker-compose.full.yml
# الوظيفة: التشغيل الكامل لجميع خدمات المنصة

version: '3.8'

services:
  # ====================== Core Services ======================
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: trading_timescaledb
    environment:
      POSTGRES_DB: trading_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - trading_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trading_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading_network
    restart: unless-stopped

  # ====================== Backend Services ======================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: trading_backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@timescaledb:5432/trading_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - timescaledb
      - redis
    networks:
      - trading_network
    restart: unless-stopped

  # ====================== AI Workers ======================
  ai_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: trading_ai_worker
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./models:/app/models
    depends_on:
      - redis
      - backend
    networks:
      - trading_network
    restart: unless-stopped
    command: python workers/ai_worker.py

  # ====================== WebSocket Server ======================
  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile.websocket
    container_name: trading_websocket
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - backend
    networks:
      - trading_network
    restart: unless-stopped

  # ====================== Telegram Bot ======================
  telegram_bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
    container_name: trading_telegram_bot
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - trading_network
    restart: unless-stopped

  # ====================== Frontend ======================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - trading_network
    restart: unless-stopped

  # ====================== Monitoring ======================
  prometheus:
    image: prom/prometheus:latest
    container_name: trading_prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - trading_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: trading_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - trading_network
    restart: unless-stopped

  # ====================== Load Balancer ======================
  nginx:
    image: nginx:alpine
    container_name: trading_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./config/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
      - websocket
    networks:
      - trading_network
    restart: unless-stopped

networks:
  trading_network:
    driver: bridge

volumes:
  timescale_data:
  redis_data:
  prometheus_data:
  grafana_data:
