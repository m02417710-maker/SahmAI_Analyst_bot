# ملف: .github/workflows/auto_updater.yml
# المسار: /trading_platform/.github/workflows/auto_updater.yml
# الوظيفة: نظام أتمتة كامل للتحديث الذاتي

name: 🤖 Boursagi AI - Auto Pilot System

on:
  schedule:
    # يعمل في أوقات البورصات المختلفة
    - cron: '0 8 * * 1-4'   # 8 صباحاً - البورصة المصرية
    - cron: '0 10 * * 1-4'  # 10 صباحاً - تداول السعودية
    - cron: '0 14 * * 1-5'  # 2 ظهراً - البورصة الأمريكية
    - cron: '30 17 * * 1-5' # 5:30 مساءً - إغلاق الأسواق
  
  workflow_dispatch:  # تشغيل يدوي من GitHub
    inputs:
      force_update:
        description: 'تحديث إجباري للبيانات'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.streamlit/secrets.toml'

jobs:
  # ====================== JOB 1: التحقق والتدقيق ======================
  validate-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: 💾 تثبيت المكتبات الأساسية
        run: |
          python -m pip install --upgrade pip
          pip install black isort autoflake pylint
          pip install yfinance pandas numpy plotly
          pip install streamlit google-generativeai pandas-ta
          
      - name: 📦 تثبيت باقي المتطلبات
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
      - name: 🔍 فحص الكود (Linting)
        run: |
          echo "🔍 فحص الكود باستخدام pylint..."
          pylint *.py --fail-under=5 --exit-zero || true
          
      - name: 🛠 إصلاح التنسيق تلقائياً (Black)
        run: |
          echo "🎨 إصلاح تنسيق الكود..."
          black --line-length 88 --target-version py310 *.py
          
      - name: 📋 ترتيب الاستيرادات (isort)
        run: |
          echo "📋 ترتيب الاستيرادات..."
          isort --profile black *.py
          
      - name: 🧹 إزالة الاستيرادات غير المستخدمة
        run: |
          echo "🧹 تنظيف الاستيرادات..."
          autoflake --in-place --remove-all-unused-imports --remove-unused-variables *.py
          
      - name: ✅ التحقق من صحة الكود
        run: |
          echo "✅ التحقق من الصحة النهائية..."
          python -m py_compile *.py
          
      - name: 📝 تسجيل التغييرات
        run: |
          echo "🤖 تحديث تلقائي $(date '+%Y-%m-%d %H:%M:%S')" > last_update.txt
          echo "تم إجراء الإصلاحات التالية:" >> last_update.txt
          echo "- تنسيق الكود باستخدام Black" >> last_update.txt
          echo "- ترتيب الاستيرادات باستخدام isort" >> last_update.txt
          echo "- إزالة الاستيرادات غير المستخدمة" >> last_update.txt
          
      - name: 📤 رفع التعديلات
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 [AUTO] تحديث تلقائي وإصلاح تنسيق الكود - $(date '+%Y-%m-%d %H:%M:%S')"
          commit_user_name: "Boursagi AI Bot"
          commit_user_email: "bot@boursagi.ai"
          commit_author: "Boursagi AI Bot <bot@boursagi.ai>"
          file_pattern: "*.py last_update.txt"

  # ====================== JOB 2: جلب وتحليل البيانات ======================
  fetch-and-analyze:
    runs-on: ubuntu-latest
    needs: validate-and-fix
    timeout-minutes: 20
    
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v3
        
      - name: 🐍 إعداد بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 📦 تثبيت المتطلبات
        run: |
          pip install --upgrade pip
          pip install yfinance pandas pandas-ta google-generativeai streamlit
          
      - name: 📊 جلب بيانات الأسهم اليومية
        run: python scripts/fetch_daily_data.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
      - name: 🤖 توليد التحليل اليومي
        run: python scripts/generate_daily_analysis.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: 📈 تحديث المؤشرات الفنية
        run: python scripts/update_indicators.py
        continue-on-error: true
        
      - name: 💾 حفظ البيانات في الكاش
        run: |
          mkdir -p .cache
          cp data/*.json .cache/ 2>/dev/null || true
          
      - name: 📤 رفع البيانات المحدثة
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "📊 [AUTO] تحديث بيانات السوق والتحليلات - $(date '+%Y-%m-%d')"
          commit_user_name: "Boursagi Data Bot"
          commit_user_email: "data@boursagi.ai"
          file_pattern: "data/*.json .cache/*"

  # ====================== JOB 3: الاختبار والتأكد من الجودة ======================
  test-and-verify:
    runs-on: ubuntu-latest
    needs: [validate-and-fix, fetch-and-analyze]
    timeout-minutes: 10
    
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v3
        
      - name: 🐍 إعداد بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 📦 تثبيت المتطلبات
        run: |
          pip install pytest streamlit
          pip install -r requirements.txt 2>/dev/null || true
          
      - name: 🧪 تشغيل اختبارات الجودة
        run: |
          echo "🧪 تشغيل اختبارات الجودة..."
          python -c "import app; print('✅ app.py يعمل')"
          python -c "import engines; print('✅ engines.py يعمل')"
          
      - name: 🎯 اختبار تحليل Gemini
        run: |
          echo "🎯 اختبار تحليل الذكاء الاصطناعي..."
          python scripts/test_gemini.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true
        
      - name: 📊 التحقق من جودة البيانات
        run: |
          echo "📊 التحقق من جودة البيانات..."
          python scripts/validate_data.py
          
      - name: 🔔 إرسال إشعار الحالة
        if: always()
        run: |
          echo "📢 إرسال إشعار حالة النظام..."
          python scripts/send_status_notification.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

  # ====================== JOB 4: النشر التلقائي ======================
  deploy:
    runs-on: ubuntu-latest
    needs: [test-and-verify]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v3
        
      - name: 🚀 تفعيل Streamlit Cloud Deploy
        run: |
          echo "🚀 جاهز للنشر على Streamlit Cloud..."
          echo "سيتم تحديث التطبيق تلقائياً خلال دقائق"
          
      - name: 📝 سجل النشر
        run: |
          echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')" >> deploy_log.txt
          echo "版本: ${{ github.sha }}" >> deploy_log.txt
          echo "状态: ✅ نجاح" >> deploy_log.txt
          
      - name: 📤 رفع سجل النشر
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🚀 [DEPLOY] نشر تلقائي ناجح - $(date '+%Y-%m-%d %H:%M:%S')"
          file_pattern: "deploy_log.txt"
