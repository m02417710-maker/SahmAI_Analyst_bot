# ملف: .streamlit/secrets.toml
# المسار: /trading_platform/.streamlit/secrets.toml
# ⚠️ مهم: لا تقم برفع هذا الملف إلى GitHub أبداً!

# ====================== API Keys ======================
# Google Gemini API
GEMINI_API_KEY = "your_gemini_api_key_here"

# OpenAI (ChatGPT)
OPENAI_API_KEY = "your_openai_api_key_here"

# Telegram Bot
TELEGRAM_TOKEN = "your_telegram_bot_token_here"
TELEGRAM_CHAT_ID = "your_chat_id_here"

# ====================== Database ======================
DB_USER = "trader"
DB_PASSWORD = "your_secure_password"
DB_NAME = "trading_db"
DB_HOST = "localhost"
DB_PORT = "5432"

# ====================== Redis ======================
REDIS_PASSWORD = "your_redis_password"
REDIS_HOST = "localhost"
REDIS_PORT = "6379"

# ====================== Stripe (Payments) ======================
STRIPE_PUBLIC_KEY = "pk_live_xxx"
STRIPE_SECRET_KEY = "sk_live_xxx"
STRIPE_WEBHOOK_SECRET = "whsec_xxx"

# ====================== Admin ======================
ADMIN_EMAIL = "admin@trading-platform.com"
ADMIN_PASSWORD_HASH = "your_secure_password_hash"

# ====================== Security ======================
JWT_SECRET_KEY = "your_jwt_secret_key"
ENCRYPTION_KEY = "your_encryption_key"

# ====================== Email ======================
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_USER = "your_email@gmail.com"
SMTP_PASSWORD = "your_email_password"

# ====================== API Limits ======================
RATE_LIMIT_REQUESTS = "100"
RATE_LIMIT_PERIOD = "60"

# ====================== Features ======================
ENABLE_AUTO_TRADING = "true"
ENABLE_COPY_TRADING = "true"
ENABLE_SOCIAL_TRADING = "true"
ENABLE_VOICE_ASSISTANT = "true"
ENABLE_AI_CHAT = "true"
