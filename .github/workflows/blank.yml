
st.title("📈 بوت تحليل الأسهم الذكي")
st.markdown("**واجهة عربية تفاعلية مدعومة بالذكاء الاصطناعي | yfinance + Gemini + pandas_ta**")

# ====================== إعداد Gemini ======================
try:
    if "GEMINI_API_KEY" not in st.secrets:
        st.error("❌ يرجى إضافة GEMINI_API_KEY في secrets.toml")
        st.stop()

    genai.configure(api_key=st.secrets["GEMINI_API_KEY"])

    model_name = st.sidebar.selectbox(
        "اختر نموذج الذكاء الاصطناعي",
        options=["gemini-1.5-flash", "gemini-1.5-pro"],
        index=0
    )
    model = genai.GenerativeModel(model_name)

except Exception as e:
    st.error(f"خطأ في تهيئة Gemini: {e}")
    st.stop()

# ====================== دوال المساعدة ======================
@st.cache_data(ttl=300)
def get_stock_data(ticker: str, period: str = "1y"):
    try:
        stock = yf.Ticker(ticker)
        hist = stock.history(period=period)
        info = stock.info
        if hist.empty:
            return None, None
        return hist, info
    except:
        return None, None

def add_technical_indicators(df: pd.DataFrame) -> pd.DataFrame:
    try:
        df = df.copy()
        df['SMA_20'] = ta.sma(df['Close'], length=20)
        df['SMA_50'] = ta.sma(df['Close'], length=50)
        df['EMA_20'] = ta.ema(df['Close'], length=20)
        df['RSI'] = ta.rsi(df['Close'], length=14)
        
        macd = ta.macd(df['Close'], fast=12, slow=26, signal=9)
        df = pd.concat([df, macd], axis=1)
        
        bb = ta.bbands(df['Close'], length=20)
        df = pd.concat([df, bb], axis=1)
        
        return df
    except:
        return df

# ====================== Sidebar ======================
with st.sidebar:
    st.header("⚙️ إعدادات التحليل")
    
    ticker = st.text_input("رمز السهم الأول", value="2222.SR", help="مثال: 2222.SR أو AAPL")
    period = st.selectbox("الفترة الزمنية", ["1mo", "3mo", "6mo", "1y", "2y", "5y"], index=3)
    
    show_indicators = st.checkbox("إظهار المؤشرات الفنية (RSI, MACD, Bollinger)", value=True)
    
    st.divider()
    st.subheader("🔄 مقارنة بين سهمين")
    compare_mode = st.checkbox("تفعيل وضع المقارنة")
    
    if compare_mode:
        ticker2 = st.text_input("رمز السهم الثاني", value="AAPL")
        compare_period = st.selectbox("فترة المقارنة", ["3mo", "6mo", "1y", "2y"], index=2)

# ====================== التحليل الرئيسي ======================
if ticker:
    with st.spinner(f"جاري تحميل بيانات {ticker}..."):
        hist, info = get_stock_data(ticker, period)
    
    if hist is not None and not hist.empty:
        hist = add_technical_indicators(hist)
        
        # عرض المؤشرات الأساسية
        col1, col2, col3, col4 = st.columns(4)
        with col1:
            price = info.get('currentPrice') or info.get('regularMarketPrice')
            st.metric("السعر الحالي", f"{price:.2f}" if price else "N/A")
        with col2:
            change = info.get('regularMarketChangePercent', 0)
            st.metric("التغيير اليومي", f"{change:.2f}%", delta=f"{change:.2f}%")
        with col3:
            cap = info.get('marketCap', 0)
            st.metric("القيمة السوقية", f"{cap/1e9:.1f}B" if cap else "N/A")
        with col4:
            pe = info.get('trailingPE') or info.get('forwardPE')
            st.metric("P/E Ratio", f"{pe:.2f}" if pe else "N/A")

        # الرسم البياني الرئيسي
        rows = 3 if show_indicators else 1
        fig = make_subplots(rows=rows, cols=1, shared_xaxes=True, 
                           row_heights=[0.55, 0.225, 0.225] if show_indicators else [1],
                           subplot_titles=("سعر السهم", "MACD", "RSI") if show_indicators else None)

        fig.add_trace(go.Candlestick(x=hist.index, open=hist['Open'], high=hist['High'],
                                    low=hist['Low'], close=hist['Close'], name="Candlestick"), row=1, col=1)

        if 'BBU_20_2.0' in hist.columns:
            fig.add_trace(go.Scatter(x=hist.index, y=hist['BBU_20_2.0'], name="Upper BB", line=dict(color='gray', dash='dash')), row=1, col=1)
            fig.add_trace(go.Scatter(x=hist.index, y=hist['BBL_20_2.0'], name="Lower BB", line=dict(color='gray', dash='dash')), row=1, col=1)

        fig.add_trace(go.Scatter(x=hist.index, y=hist['SMA_20'], name="SMA 20", line=dict(color='orange')), row=1, col=1)
        fig.add_trace(go.Scatter(x=hist.index, y=hist['SMA_50'], name="SMA 50", line=dict(color='blue')), row=1, col=1)

        if show_indicators:
            fig.add_trace(go.Scatter(x=hist.index, y=hist['MACD_12_26_9'], name="MACD", line=dict(color='green')), row=2, col=1)
            fig.add_trace(go.Scatter(x=hist.index, y=hist['MACDs_12_26_9'], name="Signal", line=dict(color='red')), row=2, col=1)
            fig.add_trace(go.Scatter(x=hist.index, y=hist['RSI'], name="RSI", line=dict(color='purple')), row=3, col=1)
            fig.add_hline(y=70, line_dash="dash", line_color="red", row=3, col=1)
            fig.add_hline(y=30, line_dash="dash", line_color="green", row=3, col=1)

        fig.update_layout(height=700 if show_indicators else 500, xaxis_rangeslider_visible=False, template="plotly_dark")
        st.plotly_chart(fig, use_container_width=True)

        # تحميل البيانات
        st.download_button("⬇️ تحميل البيانات كـ CSV", hist.to_csv().encode(), f"{ticker}.csv", "text/csv")

        # ====================== الشات الذكي ======================
        st.subheader("💬 التحليل الذكي مع Gemini")
        query = st.text_area("اكتب سؤالك عن السهم:", placeholder="حلل السهم فنياً... ما توقعات أرامكو في الشهر القادم؟", height=100)
        
        if st.button("احصل على التحليل", type="primary"):
            if query:
                with st.spinner("جاري التحليل باستخدام Gemini..."):
                    try:
                        prompt = f"أنت محلل أسهم محترف. حلل السهم {ticker} بالعربية:\nالمعلومات: {info}\nالبيانات الأخيرة:\n{hist.tail(10).to_string()}\nالطلب: {query}"
                        response = model.generate_content(prompt)
                        st.write(response.text)
                    except Exception as e:
                        st.error(f"خطأ في التحليل: {e}")

        # ====================== مقارنة بين سهمين ======================
        if compare_mode and 'ticker2' in locals():
            with st.spinner(f"جاري مقارنة {ticker} مع {ticker2}..."):
                hist2, info2 = get_stock_data(ticker2, compare_period)
            
            if hist2 is not None and not hist2.empty:
                compare_df = pd.DataFrame({ticker: hist['Close'], ticker2: hist2['Close']}).dropna()
                
                fig_comp = go.Figure()
                fig_comp.add_trace(go.Scatter(x=compare_df.index, y=compare_df[ticker], name=ticker))
                fig_comp.add_trace(go.Scatter(x=compare_df.index, y=compare_df[ticker2], name=ticker2))
                fig_comp.update_layout(title=f"مقارنة أداء {ticker} و {ticker2}", height=500, template="plotly_dark")
                st.plotly_chart(fig_comp, use_container_width=True)

                if st.button("🔍 تحليل مقارن بـ Gemini"):
                    with st.spinner("جاري التحليل المقارن..."):
                        prompt_comp = f"قارن بين السهمين {ticker} و {ticker2} بالعربية مع تحليل وتوصية واضحة."
                        try:
                            resp = model.generate_content(prompt_comp)
                            st.write(resp.text)
                        except Exception as e:
                            st.error(f"خطأ: {e}")
    else:
        st.warning("لم يتم العثور على بيانات السهم. تأكد من صحة الرمز.")
