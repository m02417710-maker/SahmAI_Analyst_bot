# ملف: config/logging.yaml
# المسار: /trading_platform/config/logging.yaml
# الوظيفة: تكوين نظام التسجيل

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  json:
    format: '{"time": "%(asctime)s", "level": "%(levelname)s", "name": "%(name)s", "message": "%(message)s"}'
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout
  
  file_api:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/api.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
  
  file_error:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 10
  
  file_access:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: default
    filename: logs/access.log
    maxBytes: 10485760
    backupCount: 30

loggers:
  api:
    level: INFO
    handlers: [console, file_api]
    propagate: false
  
  access:
    level: INFO
    handlers: [file_access]
    propagate: false
  
  error:
    level: ERROR
    handlers: [console, file_error]
    propagate: false

root:
  level: INFO
  handlers: [console, file_error]
