# إضافة إلى docker-compose.yml الحالي

services:
  # ... الخدمات السابقة ...
  
  # نظام التداول الآلي
  auto_trader:
    build:
      context: ./backend
      dockerfile: Dockerfile.trader
    container_name: trading_auto_trader
    environment:
      - DATABASE_URL=postgresql://trader:secure_password_2024@timescaledb:5432/trading_db
      - REDIS_URL=redis://:redis_secure_pass@redis:6379
    volumes:
      - ./backend:/app
      - ./logs:/logs
    depends_on:
      - backend
      - redis
      - timescaledb
    networks:
      - trading_network
    restart: unless-stopped
    command: python agents/auto_trader.py

  # وكيل تحليل المشاعر
  sentiment_agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.sentiment
    container_name: trading_sentiment_agent
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://:redis_secure_pass@redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - trading_network
    restart: unless-stopped
    command: python agents/sentiment_agent.py

  # Prometheus للمراقبة
  prometheus:
    image: prom/prometheus:latest
    container_name: trading_prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - trading_network
    restart: unless-stopped

  # Grafana للوحات التحكم
  grafana:
    image: grafana/grafana:latest
    container_name: trading_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - trading_network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
